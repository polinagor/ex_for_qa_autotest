plugins {
    id 'java-library'
}

repositories {
    mavenCentral()
}

dependencies {
    testImplementation (
            "com.codeborne:selenide:7.14.0",
            'org.junit.jupiter:junit-jupiter:5.14.2',
            'org.seleniumhq.selenium:selenium-devtools-v150:4.40.0')
}

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
}

test {
    useJUnitPlatform()
}
